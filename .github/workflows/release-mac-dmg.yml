# Builds Restfy.dmg on macOS and attaches it to a GitHub Release.
#
# How to ship a download:
# 1. GitHub → Releases → "Draft a new release"
# 2. Choose or create a tag (e.g. v2.0.0), add release notes, click "Publish release"
# 3. This workflow runs and uploads dist/*.dmg to that release.
#
# Manual: Actions → "Release macOS DMG" → Run workflow → enter an existing tag.

name: Release macOS DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach the DMG to (e.g. v2.0.0)'
        required: true
        type: string

jobs:
  build-dmg:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build DMG (electron-builder)
        run: npm run build:dmg
        env:
          # Unsigned build is fine for open-source; no Apple certs in CI
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG to release (on publish)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          tag_name: ${{ inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
