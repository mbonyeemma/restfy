<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Documentation — Restify</title>
<link rel="icon" type="image/png" href="./assets/icon-_2KpqGqI.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page: #1a1a1a;
  --bg-sidebar: #111;
  --bg-card: #222;
  --bg-code: #0d0d0d;
  --bg-hover: #2a2a2a;
  --border: #2e2e2e;
  --text-primary: #e8e8e8;
  --text-secondary: #aaa;
  --text-dim: #555;
  --accent: #ef5c35;
  --accent-hover: #f06e4a;
  --accent-glow: rgba(239,92,53,.12);
  --green: #3dd68c;   --green-bg: rgba(61,214,140,.12);
  --red: #f56565;     --red-bg: rgba(245,101,101,.12);
  --yellow: #f6c90e;  --yellow-bg: rgba(246,201,14,.12);
  --blue: #4da6ff;    --blue-bg: rgba(77,166,255,.12);
  --purple: #a78bfa;  --purple-bg: rgba(167,139,250,.12);
  --cyan: #22d3ee;    --cyan-bg: rgba(34,211,238,.12);
  --orange: #fb923c;  --orange-bg: rgba(251,146,60,.12);
  --sidebar-w: 260px;
  --topbar-h: 52px;
}
[data-theme="light"] {
  --bg-page: #f5f5f5;
  --bg-sidebar: #fff;
  --bg-card: #fff;
  --bg-code: #f3f4f6;
  --bg-hover: #f0f0f0;
  --border: #e5e5e5;
  --text-primary: #111;
  --text-secondary: #555;
  --text-dim: #aaa;
  --accent: #ef5c35;
  --accent-hover: #e04a25;
  --accent-glow: rgba(239,92,53,.08);
  --green: #16a34a;   --green-bg: rgba(22,163,74,.1);
  --red: #dc2626;     --red-bg: rgba(220,38,38,.1);
  --yellow: #ca8a04;  --yellow-bg: rgba(202,138,4,.1);
  --blue: #2563eb;    --blue-bg: rgba(37,99,235,.1);
  --purple: #7c3aed;  --purple-bg: rgba(124,58,237,.1);
  --cyan: #0891b2;    --cyan-bg: rgba(8,145,178,.1);
  --orange: #ea580c;  --orange-bg: rgba(234,88,12,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg-page);color:var(--text-primary);height:100vh;overflow:hidden;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:'Inter',sans-serif;cursor:pointer}
code,pre{font-family:'JetBrains Mono',monospace}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);background:var(--bg-sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-logo{width:26px;height:26px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;letter-spacing:-1px;flex-shrink:0}
.topbar-site{font-size:13px;font-weight:600;color:var(--text-secondary)}
.topbar-divider{width:1px;height:22px;background:var(--border);flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);flex-shrink:0}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-theme{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:14px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.btn-theme:hover{border-color:var(--accent);color:var(--accent)}
.btn-open{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:600;transition:background .15s}
.btn-open:hover{background:var(--accent-hover)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-collection{font-size:13px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-count{font-size:11px;color:var(--text-dim);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-folder{display:flex;align-items:center;gap:6px;padding:6px 16px;cursor:pointer;user-select:none;font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.3px}
.sidebar-folder:hover{background:var(--bg-hover)}
.sidebar-folder-arrow{font-size:9px;color:var(--text-dim);transition:transform .15s;flex-shrink:0}
.sidebar-folder-arrow.open{transform:rotate(90deg)}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:5px 16px 5px 28px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:background .1s;border-left:2px solid transparent}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.sidebar-item.active{background:var(--accent-glow);color:var(--text-primary);border-left-color:var(--accent)}
.sidebar-item.root-level{padding-left:16px}
.m-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;min-width:36px;text-align:center;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.m-GET{color:var(--green);background:var(--green-bg)}
.m-POST{color:var(--yellow);background:var(--yellow-bg)}
.m-PUT{color:var(--blue);background:var(--blue-bg)}
.m-PATCH{color:var(--purple);background:var(--purple-bg)}
.m-DELETE{color:var(--red);background:var(--red-bg)}
.m-HEAD{color:var(--cyan);background:var(--cyan-bg)}
.m-OPTIONS{color:var(--orange);background:var(--orange-bg)}

/* ── MAIN SPLIT ── */
.main-split{flex:1;display:flex;overflow:hidden}

/* ── DOCS CONTENT ── */
.docs-content{flex:1;overflow-y:auto;padding:0}
.docs-content::-webkit-scrollbar{width:6px}
.docs-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.collection-intro{padding:32px 36px;border-bottom:1px solid var(--border)}
.collection-name{font-size:26px;font-weight:800;margin-bottom:8px}
.collection-desc{font-size:14px;color:var(--text-secondary);line-height:1.7;white-space:pre-wrap}
.collection-meta{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.meta-pill{font-size:11px;color:var(--text-dim);background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:3px 12px}
.meta-pill strong{color:var(--text-secondary)}

.folder-section{border-bottom:1px solid var(--border)}
.folder-header{padding:18px 36px 14px;background:var(--bg-sidebar);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.folder-icon{font-size:16px}
.folder-name{font-size:16px;font-weight:700}
.folder-auth-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin-left:8px}

.endpoint{border-bottom:1px solid var(--border)}
.endpoint-row{display:flex;gap:0;min-height:0}
.ep-left{flex:1;padding:24px 36px;border-right:1px solid var(--border);min-width:0}
.ep-right{width:380px;flex-shrink:0;padding:24px 24px;background:var(--bg-code)}

.ep-headline{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.ep-method{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace}
.ep-name{font-size:17px;font-weight:700}
.ep-url{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;background:var(--bg-code);border:1px solid var(--border);border-radius:6px;padding:8px 14px;margin:10px 0 16px;word-break:break-all;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ep-url span{flex:1;color:var(--text-secondary)}
.copy-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:2px 7px;transition:all .1s;white-space:nowrap}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}

.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin:16px 0 8px}
.params-table{width:100%;border-collapse:collapse;font-size:12px}
.params-table th{text-align:left;padding:6px 10px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);border-bottom:1px solid var(--border)}
.params-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:top}
.params-table td:first-child{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-primary)}
.params-table tr:last-child td{border-bottom:none}

.auth-badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);background:var(--bg-code);border:1px solid var(--border);border-radius:6px;padding:6px 12px;margin-bottom:4px}
.auth-badge strong{color:var(--text-primary)}

/* ── CURL PANEL ── */
.curl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.curl-block{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;position:relative;overflow:hidden}
.curl-block pre{padding:16px;font-size:11px;line-height:1.7;overflow-x:auto;color:var(--text-secondary);white-space:pre-wrap;word-break:break-all}
.curl-copy{position:absolute;top:8px;right:8px}
.curl-copy .copy-btn{background:var(--bg-code)}

/* ── LOADING / EMPTY ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-dim);font-size:14px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-wrap{padding:60px 36px;text-align:center}
.error-icon{font-size:48px;opacity:.3;margin-bottom:16px}
.error-title{font-size:16px;font-weight:600;margin-bottom:8px}
.error-sub{font-size:13px;color:var(--text-dim)}

/* ── INTRO AUTH ── */
.intro-auth{padding:16px 36px;border-bottom:1px solid var(--border);background:var(--bg-card)}
.intro-auth-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px}

@media(max-width:900px){
  .sidebar{display:none}
  .ep-right{display:none}
}
</style>
  <script type="module" crossorigin src="./assets/docs-brjZ7Mtu.js"></script>
</head>
<body>

<div class="topbar">
  <a class="topbar-brand" href="https://app.restify.online/" target="_blank" rel="noopener" title="Restify">
    <div class="topbar-logo">R</div>
    <span class="topbar-site">Restify</span>
  </a>
  <div class="topbar-divider"></div>
  <div class="topbar-title" id="topbarTitle">Loading…</div>
  <div class="topbar-meta" id="topbarMeta"></div>
  <div class="topbar-actions">
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☾</button>
    <a class="btn-open" id="openBtn" href="#" target="_blank" rel="noopener">↗ Open in Restify</a>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-collection" id="sidebarTitle">Loading…</div>
      <div class="sidebar-count" id="sidebarCount"></div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
  </nav>

  <div class="main-split">
    <div class="docs-content" id="docsContent">
      <div class="loading-wrap"><div class="spinner"></div>Loading documentation…</div>
    </div>
  </div>
</div>

</body>
</html>
