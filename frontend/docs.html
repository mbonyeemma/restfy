<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Documentation — Restify</title>
<link rel="icon" type="image/png" href="/assets/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page: #1a1a1a;
  --bg-sidebar: #111;
  --bg-card: #222;
  --bg-code: #0d0d0d;
  --bg-hover: #2a2a2a;
  --border: #2e2e2e;
  --text-primary: #e8e8e8;
  --text-secondary: #aaa;
  --text-dim: #555;
  --accent: #ef5c35;
  --accent-hover: #f06e4a;
  --accent-glow: rgba(239,92,53,.12);
  --green: #3dd68c;   --green-bg: rgba(61,214,140,.12);
  --red: #f56565;     --red-bg: rgba(245,101,101,.12);
  --yellow: #f6c90e;  --yellow-bg: rgba(246,201,14,.12);
  --blue: #4da6ff;    --blue-bg: rgba(77,166,255,.12);
  --purple: #a78bfa;  --purple-bg: rgba(167,139,250,.12);
  --cyan: #22d3ee;    --cyan-bg: rgba(34,211,238,.12);
  --orange: #fb923c;  --orange-bg: rgba(251,146,60,.12);
  --sidebar-w: 260px;
  --topbar-h: 52px;
}
[data-theme="light"] {
  --bg-page: #f5f5f5;
  --bg-sidebar: #fff;
  --bg-card: #fff;
  --bg-code: #f3f4f6;
  --bg-hover: #f0f0f0;
  --border: #e5e5e5;
  --text-primary: #111;
  --text-secondary: #555;
  --text-dim: #aaa;
  --accent: #ef5c35;
  --accent-hover: #e04a25;
  --accent-glow: rgba(239,92,53,.08);
  --green: #16a34a;   --green-bg: rgba(22,163,74,.1);
  --red: #dc2626;     --red-bg: rgba(220,38,38,.1);
  --yellow: #ca8a04;  --yellow-bg: rgba(202,138,4,.1);
  --blue: #2563eb;    --blue-bg: rgba(37,99,235,.1);
  --purple: #7c3aed;  --purple-bg: rgba(124,58,237,.1);
  --cyan: #0891b2;    --cyan-bg: rgba(8,145,178,.1);
  --orange: #ea580c;  --orange-bg: rgba(234,88,12,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg-page);color:var(--text-primary);height:100vh;overflow:hidden;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:'Inter',sans-serif;cursor:pointer}
code,pre{font-family:'JetBrains Mono',monospace}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);background:var(--bg-sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-logo{width:26px;height:26px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;letter-spacing:-1px;flex-shrink:0}
.topbar-site{font-size:13px;font-weight:600;color:var(--text-secondary)}
.topbar-divider{width:1px;height:22px;background:var(--border);flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);flex-shrink:0}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-theme{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);font-size:14px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.btn-theme:hover{border-color:var(--accent);color:var(--accent)}
.btn-open{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:600;transition:background .15s}
.btn-open:hover{background:var(--accent-hover)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-collection{font-size:13px;font-weight:700;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-count{font-size:11px;color:var(--text-dim);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-folder{display:flex;align-items:center;gap:6px;padding:6px 16px;cursor:pointer;user-select:none;font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:.3px}
.sidebar-folder:hover{background:var(--bg-hover)}
.sidebar-folder-arrow{font-size:9px;color:var(--text-dim);transition:transform .15s;flex-shrink:0}
.sidebar-folder-arrow.open{transform:rotate(90deg)}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:5px 16px 5px 28px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:background .1s;border-left:2px solid transparent}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.sidebar-item.active{background:var(--accent-glow);color:var(--text-primary);border-left-color:var(--accent)}
.sidebar-item.root-level{padding-left:16px}
.m-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;min-width:36px;text-align:center;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.m-GET{color:var(--green);background:var(--green-bg)}
.m-POST{color:var(--yellow);background:var(--yellow-bg)}
.m-PUT{color:var(--blue);background:var(--blue-bg)}
.m-PATCH{color:var(--purple);background:var(--purple-bg)}
.m-DELETE{color:var(--red);background:var(--red-bg)}
.m-HEAD{color:var(--cyan);background:var(--cyan-bg)}
.m-OPTIONS{color:var(--orange);background:var(--orange-bg)}

/* ── MAIN SPLIT ── */
.main-split{flex:1;display:flex;overflow:hidden}

/* ── DOCS CONTENT ── */
.docs-content{flex:1;overflow-y:auto;padding:0}
.docs-content::-webkit-scrollbar{width:6px}
.docs-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.collection-intro{padding:32px 36px;border-bottom:1px solid var(--border)}
.collection-name{font-size:26px;font-weight:800;margin-bottom:8px}
.collection-desc{font-size:14px;color:var(--text-secondary);line-height:1.7;white-space:pre-wrap}
.collection-meta{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.meta-pill{font-size:11px;color:var(--text-dim);background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:3px 12px}
.meta-pill strong{color:var(--text-secondary)}

.folder-section{border-bottom:1px solid var(--border)}
.folder-header{padding:18px 36px 14px;background:var(--bg-sidebar);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.folder-icon{font-size:16px}
.folder-name{font-size:16px;font-weight:700}
.folder-auth-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin-left:8px}

.endpoint{border-bottom:1px solid var(--border)}
.endpoint-row{display:flex;gap:0;min-height:0}
.ep-left{flex:1;padding:24px 36px;border-right:1px solid var(--border);min-width:0}
.ep-right{width:380px;flex-shrink:0;padding:24px 24px;background:var(--bg-code)}

.ep-headline{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.ep-method{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace}
.ep-name{font-size:17px;font-weight:700}
.ep-url{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;background:var(--bg-code);border:1px solid var(--border);border-radius:6px;padding:8px 14px;margin:10px 0 16px;word-break:break-all;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ep-url span{flex:1;color:var(--text-secondary)}
.copy-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;padding:2px 7px;transition:all .1s;white-space:nowrap}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}

.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin:16px 0 8px}
.params-table{width:100%;border-collapse:collapse;font-size:12px}
.params-table th{text-align:left;padding:6px 10px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);border-bottom:1px solid var(--border)}
.params-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:top}
.params-table td:first-child{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-primary)}
.params-table tr:last-child td{border-bottom:none}

.auth-badge{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);background:var(--bg-code);border:1px solid var(--border);border-radius:6px;padding:6px 12px;margin-bottom:4px}
.auth-badge strong{color:var(--text-primary)}

/* ── CURL PANEL ── */
.curl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.curl-block{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;position:relative;overflow:hidden}
.curl-block pre{padding:16px;font-size:11px;line-height:1.7;overflow-x:auto;color:var(--text-secondary);white-space:pre-wrap;word-break:break-all}
.curl-copy{position:absolute;top:8px;right:8px}
.curl-copy .copy-btn{background:var(--bg-code)}

/* ── LOADING / EMPTY ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--text-dim);font-size:14px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-wrap{padding:60px 36px;text-align:center}
.error-icon{font-size:48px;opacity:.3;margin-bottom:16px}
.error-title{font-size:16px;font-weight:600;margin-bottom:8px}
.error-sub{font-size:13px;color:var(--text-dim)}

/* ── INTRO AUTH ── */
.intro-auth{padding:16px 36px;border-bottom:1px solid var(--border);background:var(--bg-card)}
.intro-auth-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px}

@media(max-width:900px){
  .sidebar{display:none}
  .ep-right{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-brand" href="https://app.restify.online/" target="_blank" rel="noopener" title="Restify">
    <div class="topbar-logo">R</div>
    <span class="topbar-site">Restify</span>
  </a>
  <div class="topbar-divider"></div>
  <div class="topbar-title" id="topbarTitle">Loading…</div>
  <div class="topbar-meta" id="topbarMeta"></div>
  <div class="topbar-actions">
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☾</button>
    <a class="btn-open" id="openBtn" href="#" target="_blank" rel="noopener">↗ Open in Restify</a>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-collection" id="sidebarTitle">Loading…</div>
      <div class="sidebar-count" id="sidebarCount"></div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
  </nav>

  <div class="main-split">
    <div class="docs-content" id="docsContent">
      <div class="loading-wrap"><div class="spinner"></div>Loading documentation…</div>
    </div>
  </div>
</div>

<script src="/js/config-domains.js"></script>
<script src="/js/api-base.js"></script>
<script>
let _doc = null;

function esc(s){
  return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';
}

function getCollectionId(){
  const path = window.location.pathname||'';
  const qs = new URLSearchParams(window.location.search);
  const fromQuery = qs.get('slug')||qs.get('id');
  if(fromQuery) return fromQuery;
  const m = path.match(/^\/docs\/(.+?)\/?$/);
  if(m) return decodeURIComponent(m[1]);
  const parts = path.split('/').filter(Boolean);
  return parts.length?parts[parts.length-1]:'';
}

const METHOD_COLOR = {
  GET:'var(--green)',POST:'var(--yellow)',PUT:'var(--blue)',PATCH:'var(--purple)',
  DELETE:'var(--red)',HEAD:'var(--cyan)',OPTIONS:'var(--orange)'
};
const METHOD_BG = {
  GET:'var(--green-bg)',POST:'var(--yellow-bg)',PUT:'var(--blue-bg)',PATCH:'var(--purple-bg)',
  DELETE:'var(--red-bg)',HEAD:'var(--cyan-bg)',OPTIONS:'var(--orange-bg)'
};

function methodStyle(m){
  const c=METHOD_COLOR[m]||'var(--text-dim)';
  const b=METHOD_BG[m]||'var(--bg-hover)';
  return `color:${c};background:${b}`;
}

async function loadDocs(){
  const id = getCollectionId();
  if(!id){
    showError('No collection ID in URL.');
    return;
  }
  try{
    const resp = await fetch(restifyApiUrl(`/api/shared/${id}`));
    if(!resp.ok) throw new Error(resp.status===404?'Documentation not found':'Server error '+resp.status);
    const data = await resp.json();
    _doc = data;
    render(data);
  }catch(err){
    showError(err.message);
  }
}

function showError(msg){
  document.getElementById('docsContent').innerHTML=`
    <div class="error-wrap">
      <div class="error-icon">📄</div>
      <div class="error-title">${esc(msg)}</div>
      <div class="error-sub">This link may have expired or the collection is private.</div>
    </div>`;
  document.getElementById('topbarTitle').textContent='Not Found';
}

function countAll(node){
  if(node.type==='request') return 1;
  if(!node.children) return 0;
  return node.children.reduce((s,c)=>s+countAll(c),0);
}
function allRequests(node,acc=[]){
  if(node.type==='request') acc.push(node);
  if(node.children) node.children.forEach(c=>allRequests(c,acc));
  return acc;
}

function render(data){
  const col = data.collection;
  const total = countAll(col);

  // Topbar
  document.title = data.name+' — API Docs — Restify';
  document.getElementById('topbarTitle').textContent = data.name;
  document.getElementById('topbarMeta').innerHTML =
    `<span>${total} endpoint${total!==1?'s':''}</span>
     ${data.views>0?`<span>· ${data.views} view${data.views!==1?'s':''}</span>`:''}`;
  document.getElementById('openBtn').href = `https://app.restify.online/?import=${data.id}`;

  // Sidebar
  document.getElementById('sidebarTitle').textContent = data.name;
  document.getElementById('sidebarCount').textContent = total+' endpoint'+(total!==1?'s':'');
  buildSidebar(col);

  // Content
  buildContent(col, data);
}

// ── SIDEBAR ──
function buildSidebar(col){
  const nav = document.getElementById('sidebarNav');
  let html = '';
  function walk(children, depth){
    (children||[]).forEach(child=>{
      if(child.type==='folder'){
        const fid = 'sf-'+child.id;
        html += `<div class="sidebar-folder" onclick="toggleFolder('${esc(child.id)}')" id="sfh-${esc(child.id)}">
          <span class="sidebar-folder-arrow open" id="sfa-${esc(child.id)}">▶</span>
          <span>📁 ${esc(child.name)}</span>
        </div>
        <div id="${fid}">`;
        walk(child.children, depth+1);
        html += '</div>';
      } else if(child.type==='request'){
        const cls = depth===0?'sidebar-item root-level':'sidebar-item';
        html += `<div class="${cls}" data-id="${child.id}" onclick="scrollToEndpoint('${child.id}')">
          <span class="m-badge m-${esc(child.method||'GET')}">${esc(child.method||'GET')}</span>
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(child.name)}</span>
        </div>`;
      }
    });
  }
  walk(col.children||[], 0);
  nav.innerHTML = html;
}

function toggleFolder(fid){
  const el = document.getElementById('sf-'+fid);
  const arrow = document.getElementById('sfa-'+fid);
  if(!el) return;
  const open = el.style.display!=='none';
  el.style.display = open?'none':'';
  if(arrow) arrow.classList.toggle('open', !open);
}

function scrollToEndpoint(id){
  const el = document.getElementById('ep-'+id);
  if(el){
    el.scrollIntoView({behavior:'smooth', block:'start'});
    document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active'));
    const sideItem = document.querySelector(`.sidebar-item[data-id="${id}"]`);
    if(sideItem) sideItem.classList.add('active');
  }
}

// ── CONTENT ──
function buildContent(col, meta){
  const container = document.getElementById('docsContent');
  let html = '';

  // Collection intro
  const reqs = allRequests(col);
  const folderCount = (col.children||[]).filter(c=>c.type==='folder').length;
  const desc = col.description||'';
  const published = new Date(meta.createdAt*1000).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});

  html += `<div class="collection-intro">
    <div class="collection-name">${esc(col.name)}</div>
    ${desc?`<div class="collection-desc">${esc(desc)}</div>`:''}
    <div class="collection-meta">
      <div class="meta-pill"><strong>${reqs.length}</strong> endpoint${reqs.length!==1?'s':''}</div>
      ${folderCount?`<div class="meta-pill"><strong>${folderCount}</strong> folder${folderCount!==1?'s':''}</div>`:''}
      ${meta.views?`<div class="meta-pill"><strong>${meta.views}</strong> view${meta.views!==1?'s':''}</div>`:''}
      <div class="meta-pill">Published ${esc(published)}</div>
      ${meta.owner?.name?`<div class="meta-pill">By <strong>${esc(meta.owner.name)}</strong></div>`:''}
    </div>
  </div>`;

  if(col.auth && col.auth.type && col.auth.type!=='none'){
    html += `<div class="intro-auth">
      <div class="intro-auth-label">Collection Authorization</div>
      ${renderAuth(col.auth)}
    </div>`;
  }

  function walkContent(children, inFolder){
    (children||[]).forEach(child=>{
      if(child.type==='folder'){
        const auth = child.auth && child.auth.type && child.auth.type!=='none' && child.auth.type!=='inherit';
        html += `<div class="folder-section">
          <div class="folder-header">
            <span class="folder-icon">📁</span>
            <span class="folder-name">${esc(child.name)}</span>
            ${auth?`<span class="folder-auth-badge">${esc(child.auth.type)}</span>`:''}
          </div>`;
        walkContent(child.children, true);
        html += `</div>`;
      } else if(child.type==='request'){
        html += renderEndpoint(child);
      }
    });
  }

  walkContent(col.children||[], false);

  if(reqs.length===0){
    html += `<div class="error-wrap">
      <div class="error-icon">📭</div>
      <div class="error-title">No endpoints</div>
      <div class="error-sub">This collection has no requests yet.</div>
    </div>`;
  }

  container.innerHTML = html;
}

function renderEndpoint(req){
  const m = req.method||'GET';
  const mstyle = methodStyle(m);
  const params = (req.params||[]).filter(p=>p.key&&p.enabled!==false);
  const headers = (req.headers||[]).filter(h=>h.key&&h.enabled!==false);
  const hasBody = req.bodyType && req.bodyType!=='none';
  const hasAuth = req.auth && req.auth.type && req.auth.type!=='none' && req.auth.type!=='inherit';

  let left = '';
  left += `<div class="ep-headline">
    <span class="ep-method" style="${mstyle}">${esc(m)}</span>
    <span class="ep-name">${esc(req.name)}</span>
  </div>`;

  if(req.description){
    left += `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;line-height:1.7;white-space:pre-wrap">${esc(req.description)}</div>`;
  }

  if(req.url){
    left += `<div class="ep-url">
      <span>${esc(req.url)}</span>
      <button class="copy-btn" onclick="copyInline(this,'${esc(req.url)}')">Copy</button>
    </div>`;
  }

  if(hasAuth){
    left += `<div class="section-label">Authorization</div>${renderAuth(req.auth)}`;
  }

  if(params.length){
    left += `<div class="section-label">Query Parameters</div>
      <table class="params-table"><thead><tr><th>Parameter</th><th>Value</th></tr></thead><tbody>`;
    params.forEach(p=>{ left += `<tr><td>${esc(p.key)}</td><td>${esc(p.value)}</td></tr>`; });
    left += `</tbody></table>`;
  }

  if(headers.length){
    left += `<div class="section-label">Headers</div>
      <table class="params-table"><thead><tr><th>Header</th><th>Value</th></tr></thead><tbody>`;
    headers.forEach(h=>{ left += `<tr><td>${esc(h.key)}</td><td>${esc(h.value)}</td></tr>`; });
    left += `</tbody></table>`;
  }

  if(hasBody){
    left += `<div class="section-label">Body <span style="text-transform:none;letter-spacing:0;font-weight:400">(${esc(req.bodyType)})</span></div>`;
    if(req.bodyType==='json'||req.bodyType==='raw'||req.bodyType==='graphql'){
      let display = req.body||'';
      if(req.bodyType==='json'){ try{ display=JSON.stringify(JSON.parse(display),null,2); }catch{} }
      left += `<div class="curl-block">
        <pre>${esc(display)}</pre>
        <div class="curl-copy"><button class="copy-btn" onclick="copyInline(this,\`${display.replace(/`/g,'\\`')}\`)">Copy</button></div>
      </div>`;
    } else if(req.bodyType==='form'||req.bodyType==='urlencoded'){
      const fields=(req.bodyForm||[]).filter(f=>f.key);
      if(fields.length){
        left += `<table class="params-table"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>`;
        fields.forEach(f=>{ left += `<tr><td>${esc(f.key)}</td><td>${esc(f.value)}</td></tr>`; });
        left += `</tbody></table>`;
      }
    }
  }

  // Right: curl example
  const curl = buildCurl(req);
  const right = `
    <div class="curl-label">
      <span>Example Request</span>
    </div>
    <div class="curl-block">
      <pre>${esc(curl)}</pre>
      <div class="curl-copy"><button class="copy-btn" onclick="copyInline(this,\`${curl.replace(/`/g,'\\`')}\`)">Copy</button></div>
    </div>`;

  return `<div class="endpoint" id="ep-${esc(req.id)}">
    <div class="endpoint-row">
      <div class="ep-left">${left}</div>
      <div class="ep-right">${right}</div>
    </div>
  </div>`;
}

function renderAuth(auth){
  if(!auth||!auth.type||auth.type==='none') return '';
  if(auth.type==='bearer') return `<div class="auth-badge">🔒 <strong>Bearer Token</strong></div>`;
  if(auth.type==='basic') return `<div class="auth-badge">🔒 <strong>Basic Auth</strong>${auth.username?` — ${esc(auth.username)}`:''}</div>`;
  if(auth.type==='apikey') return `<div class="auth-badge">🔑 <strong>API Key</strong>${auth.key?` — ${esc(auth.key)} in ${esc(auth.in||'header')}`:''}</div>`;
  if(auth.type==='oauth2') return `<div class="auth-badge">🔐 <strong>OAuth 2.0</strong></div>`;
  return `<div class="auth-badge">🔒 <strong>${esc(auth.type)}</strong></div>`;
}

function buildCurl(req){
  let url = req.url||'';
  if(!url.startsWith('http')) url='https://'+url;
  const params=(req.params||[]).filter(p=>p.enabled!==false&&p.key);
  if(params.length){
    const qs=params.map(p=>encodeURIComponent(p.key)+'='+encodeURIComponent(p.value)).join('&');
    url+=(url.includes('?')?'&':'?')+qs;
  }
  const m=req.method||'GET';
  const parts=[`curl -X ${m}`,'  \''+url+'\''];
  const hdrs=(req.headers||[]).filter(h=>h.enabled!==false&&h.key);
  if((req.bodyType==='json')&&!hdrs.find(h=>h.key.toLowerCase()==='content-type')){
    hdrs.push({key:'Content-Type',value:'application/json'});
  }
  if(req.auth&&req.auth.type==='bearer'&&req.auth.token){
    hdrs.push({key:'Authorization',value:'Bearer '+req.auth.token});
  }
  hdrs.forEach(h=>{ parts.push(`  -H '${h.key}: ${h.value}'`); });
  if(m!=='GET'&&m!=='HEAD'){
    if((req.bodyType==='json'||req.bodyType==='raw')&&req.body){
      parts.push(`  -d '${req.body.replace(/'/g,"'\\''")}'`);
    }
  }
  return parts.join(' \\\n');
}

function copyInline(btn, text){
  navigator.clipboard.writeText(String(text)).then(()=>{
    const orig=btn.textContent;
    btn.textContent='Copied!';
    setTimeout(()=>{ btn.textContent=orig; },1500);
  }).catch(()=>{});
}

function toggleTheme(){
  const html=document.documentElement;
  const next=(html.getAttribute('data-theme')||'dark')==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('restify_docs_theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☾':'☀';
}

(function initTheme(){
  const saved=localStorage.getItem('restify_docs_theme')||localStorage.getItem('restfy_docs_theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  document.getElementById('themeBtn').textContent=saved==='dark'?'☾':'☀';
})();

loadDocs();
</script>
