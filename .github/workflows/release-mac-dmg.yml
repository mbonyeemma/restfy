# Builds Restify.dmg on macOS and attaches it to a GitHub Release.
#
# Repository layout: Electron app lives in frontend/ (package.json + electron-builder).
#
# How users get a DMG:
# 1. Go to GitHub → Releases → pick the latest version (or any tag).
# 2. Download the .dmg asset attached to that release.
#
# How maintainers ship a new DMG:
# 1. GitHub → Releases → "Draft a new release"
# 2. Create a tag (e.g. v1.0.0), write notes, click "Publish release"
# 3. This workflow builds the DMG and uploads frontend/dist/*.dmg, latest-mac.yml, and *.blockmap
#    so the in-app auto-updater (electron-updater) can find new versions on GitHub Releases.
#
# Manual: Actions → "Release macOS DMG" → Run workflow → enter an existing tag.

name: Release macOS DMG

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to attach the DMG to (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build-dmg:
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build DMG (electron-builder)
        run: npm run build:dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload release assets (DMG + auto-update metadata)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist/*.dmg
            frontend/dist/latest-mac.yml
            frontend/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist/*.dmg
            frontend/dist/latest-mac.yml
            frontend/dist/*.blockmap
          tag_name: ${{ inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
